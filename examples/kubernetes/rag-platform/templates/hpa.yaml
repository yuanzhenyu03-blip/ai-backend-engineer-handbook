{{- if .Values.hpa.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "rag-platform.fullname" . }}
  labels:
    {{- include "rag-platform.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    # Must equal the Deployment name so HPA updates the right desired replicas.
    name: {{ include "rag-platform.fullname" . }}
  minReplicas: {{ .Values.hpa.minReplicas }}
  maxReplicas: {{ .Values.hpa.maxReplicas }}
  # This HPA scales the stateless API Deployment on an API-appropriate signal (CPU).
  # Queue-backlog scaling belongs to the queue consumer (a worker Deployment), which
  # is out of Day27 chart scope (Day28).
  metrics:
    {{- if .Values.hpa.cpu.enabled }}
    # CPU utilization is relative to the container CPU request (defined on the Deployment).
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.cpu.averageUtilization }}
    {{- end }}
{{- end }}
