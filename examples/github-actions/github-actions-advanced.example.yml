# =============================================================================
# EXAMPLE ONLY — Day22 (GitHub Actions Advanced)
#
# A production-shaped FastAPI CI/CD workflow combining the Day22 mechanisms:
#   - stable Python matrix + fail-fast: false
#   - pip cache
#   - uploaded test-report artifact
#   - experimental Python 3.13 with continue-on-error
#   - build job that `needs` the tests
#   - immutable Docker image digest (registry), not a mutable :latest tag
#   - tag-only deploy via `if`
#   - production Environment with required reviewers + production Secrets
#   - production concurrency group with cancel-in-progress: false
#   - notification with needs + if: always()
#
# This is intentionally NOT placed under `.github/workflows/` in this
# documentation repository (no FastAPI app / registry / environment exist here).
# Copy to `.github/workflows/`, then adjust image name, registry, and commands.
#
# Lesson: docs/devops/day22-github-actions-advanced.md
# =============================================================================

name: FastAPI CI/CD (advanced)

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  # ---- Scale testing across supported Python versions --------------------
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false            # each version is an independent support commitment
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      # Re-creatable acceleration; the build must still be correct on a cache miss.
      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest --cov=app --cov-report=xml

      # Formal output of THIS run -> artifact (jobs do not share a filesystem).
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  # ---- Experimental compatibility signal that must NOT block release ------
  experimental:
    runs-on: ubuntu-latest
    continue-on-error: true       # executed and may fail without blocking the flow
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install -r requirements.txt
      - run: pytest

  # ---- Build once: produce ONE immutable image digest ---------------------
  build:
    needs: test                   # ordering: build only after formal tests pass
    if: startsWith(github.ref, 'refs/tags/v')   # build releases only on version tags
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.sha }}
          # `digest` is an immutable content identifier; deploy this, not :latest.

  # ---- Deploy the SAME verified digest, protected and serialized ----------
  deploy:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production        # required reviewers + production Secrets + history
    concurrency:
      group: production            # all production deploys share one lock
      cancel-in-progress: false    # queue, never interrupt an active deployment
    steps:
      - name: Deploy immutable digest
        env:
          DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}   # production-only secret
        run: |
          echo "Deploying ghcr.io/${{ github.repository }}@${{ needs.build.outputs.image }}"
          # ./deploy.sh "ghcr.io/${{ github.repository }}@${{ needs.build.outputs.image }}"

      - name: Smoke test
        run: echo "Run a post-deploy smoke test here."

  # ---- Notify regardless of outcome ---------------------------------------
  notify:
    needs: [test, build, deploy]
    if: always()                   # run even if a dependency failed or was skipped
    runs-on: ubuntu-latest
    steps:
      - name: Report results
        run: |
          echo "test=${{ needs.test.result }}"
          echo "build=${{ needs.build.result }}"
          echo "deploy=${{ needs.deploy.result }}"
