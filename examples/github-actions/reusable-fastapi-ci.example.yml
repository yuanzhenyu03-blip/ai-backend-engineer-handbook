# =============================================================================
# EXAMPLE TEMPLATE ONLY — Day22 Reusable Workflow (Reusable JOBS / workflow)
#
# A reusable workflow defines complete JOBS (with `runs-on`) and is called via
# `workflow_call`. Use it to share one pipeline (lint -> test) across many repos
# so standards do not drift. It must not hardcode production secrets.
#
# This file in `examples/` is a TEACHING TEMPLATE. It is NOT callable from this
# path. A reusable workflow must live DIRECTLY under `.github/workflows/`;
# subdirectories are not supported, so `examples/.../file.yml` cannot be used.
#
# Step 1 — Copy this file into a real shared-workflow repository at:
#
#     .github/workflows/reusable-fastapi-ci.yml
#
# Step 2 — Call it at the JOB level (jobs.<job_id>.uses), not the step level:
#
#     jobs:
#       ci:
#         uses: your-org/your-workflows-repo/.github/workflows/reusable-fastapi-ci.yml@<commit-sha>
#         with:
#           python-version: "3.12"
#
# Prefer pinning to an immutable <commit-sha> over `@main` for supply-chain
# integrity (a branch ref like @main can move).
#
# Lesson: docs/devops/day22-github-actions-advanced.md
# =============================================================================

name: Reusable FastAPI CI

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to test against.
        type: string
        required: false
        default: "3.12"
      requirements-path:
        description: Path to the requirements file.
        type: string
        required: false
        default: requirements.txt

# Least-privilege permission boundary for the reused jobs.
permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: pip install -r "${{ inputs.requirements-path }}"

      - name: Run Ruff
        run: ruff check .

      - name: Run tests
        run: pytest
